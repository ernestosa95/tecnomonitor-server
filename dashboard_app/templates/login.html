<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - TecnoMonitor</title>
    <style>
/* ============================================================
   LOGIN — mismo Design System Oscuro que index_beta.html
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
    --bg:#0A0A0B;
    --surface:#111113;
    --surface2:#18181B;
    --border:#232327;
    --border2:#2e2e34;
    --text:#F0F0F2;
    --muted:#6B6B7A;
    --green:#00E5A0;
    --green-dim:rgba(0,229,160,0.12);
    --red:#FF5C5C;
    --red-dim:rgba(255,92,92,0.12);
    --blue:#4A8FFF;
    --amber:#FFA940;
    --amber-dim:rgba(255,169,64,0.1);
    --radius:8px;
    --radius2:12px;
    --radius3:16px;
}
html,body{
    background:var(--bg);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    color:var(--text);
    height:100%;
}
body{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;overflow-x:hidden;
}

.login-bg{
    position:fixed;inset:0;z-index:0;
    background:
        radial-gradient(circle at 20% 25%, rgba(0,229,160,0.06) 0%, transparent 45%),
        radial-gradient(circle at 80% 75%, rgba(74,143,255,0.07) 0%, transparent 45%);
}

.login-wrapper{
    position:relative;z-index:1;
    display:flex;align-items:center;justify-content:center;
    width:100%;min-height:100vh;padding:20px;box-sizing:border-box;
}
.login-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius3);padding:40px;width:100%;max-width:400px;
    box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.login-logo{
    display:flex;align-items:center;justify-content:center;gap:10px;
    margin-bottom:8px;
}
.login-logo .icon-wrap{
    width:52px;height:52px;border-radius:14px;
    background:var(--green-dim);
    display:flex;align-items:center;justify-content:center;
    color:var(--green);
}
.login-title{
    text-align:center;font-size:1.35em;font-weight:800;color:var(--text);
    margin:14px 0 4px;
}
.login-subtitle{
    text-align:center;font-size:13px;color:var(--muted);margin-bottom:30px;
}

.input-group{margin-bottom:16px}
.input-group label{
    font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;
    color:var(--muted);margin-bottom:6px;display:block;font-weight:600;
}
.input-group input,
.input-group textarea{
    background:var(--surface2);border:1px solid var(--border);
    color:var(--text);font-weight:500;width:100%;padding:11px 14px;
    border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:.92em;
    outline:none;transition:border-color .2s;box-sizing:border-box;
}
.input-group input:focus,
.input-group textarea:focus{border-color:var(--green)}
.input-group input::placeholder,
.input-group textarea::placeholder{color:var(--muted)}

.btn-login{
    width:100%;padding:12px;background:var(--green);color:#0A0A0B;
    border:none;border-radius:var(--radius);font-size:.95em;
    font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;
    transition:opacity .2s;margin-top:6px;
}
.btn-login:hover{opacity:.85}
.btn-login:disabled{opacity:.5;cursor:default}

#error-msg{
    background:var(--red-dim);color:var(--red);
    border:1px solid rgba(255,92,92,.25);
    padding:11px 14px;border-radius:var(--radius);
    font-size:.85em;margin-top:18px;display:none;
}

.solicitar-link{
    margin-top:22px;font-size:13px;color:var(--muted);text-align:center;
}
.solicitar-link a{
    color:var(--blue);font-weight:600;text-decoration:none;cursor:pointer;
}
.solicitar-link a:hover{text-decoration:underline}

/* ── MODAL ── */
.modal-overlay{
    display:none;position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,.7);z-index:5000;
    align-items:center;justify-content:center;
    backdrop-filter:blur(4px);
    padding:20px;box-sizing:border-box;
}
.modal-content{
    background:var(--surface);padding:28px;border-radius:var(--radius3);
    width:90%;max-width:460px;border:1px solid var(--border2);
    box-shadow:0 24px 64px rgba(0,0,0,.5);
    max-height:88vh;overflow-y:auto;
}
.modal-content h3{
    color:var(--text);margin:0 0 18px;font-size:1.05em;font-weight:700;
    border-bottom:1px solid var(--border);padding-bottom:14px;
}

@media(max-width:420px){
    .login-card{padding:28px 22px}
}
    </style>
</head>
<body>

<div class="login-bg"></div>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8"/><path d="M12 17v4"/>
                    <path d="M9 10h6"/><path d="M12 7v6"/>
                </svg>
            </div>
        </div>
        <h1 class="login-title">TecnoMonitor</h1>
        <p class="login-subtitle">Acceso corporativo</p>

        <div class="input-group">
            <label for="identificador">Usuario o correo</label>
            <input type="text" id="identificador" placeholder="usuario o correo@tecnoimagen.com.ar" autocomplete="username" autofocus>
        </div>

        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeyup="checkEnter(event)">
        </div>

        <button class="btn-login" id="btn-ingresar" onclick="validarAcceso()">Ingresar</button>

        <div id="error-msg"></div>

        <p class="solicitar-link">
            ¿No tenés cuenta?
            <a onclick="abrirModalSolicitud()">Solicitar acceso</a>
        </p>
    </div>
</div>

<div id="modal-version" class="modal-overlay">
    <div class="modal-content" style="max-width:380px;text-align:center">
        <h3 style="border-bottom:none;text-align:center;padding-bottom:0">¿Qué versión querés usar?</h3>
        <p style="color:var(--muted);font-size:13px;margin:0 0 22px">
            Estamos probando una nueva interfaz. Podés elegir la versión clásica o probar la beta.
        </p>
        <div style="display:flex;flex-direction:column;gap:10px">
            <button class="btn-login" onclick="irAVersionBeta()">✨ Probar versión beta</button>
            <button class="btn-login" onclick="irAVersionClasica()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)">Usar versión clásica</button>
        </div>
    </div>
</div>

<!-- Modal Solicitud de Acceso — interno o cliente -->
<div id="modal-solicitud" class="modal-overlay">
    <div class="modal-content">
        <h3>Solicitar acceso</h3>

        <div class="input-group">
            <label>Tipo de acceso</label>
            <div style="display:flex;gap:8px;margin-bottom:4px">
                <button type="button" id="btn-sol-interno" onclick="cambiarTipoSolicitud('interno')"
                    style="flex:1;padding:10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--green-dim);color:var(--green);font-weight:700;font-family:'Inter',sans-serif;cursor:pointer">
                    Interno (@tecnoimagen)
                </button>
                <button type="button" id="btn-sol-cliente" onclick="cambiarTipoSolicitud('cliente')"
                    style="flex:1;padding:10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-weight:700;font-family:'Inter',sans-serif;cursor:pointer">
                    Cliente
                </button>
            </div>
        </div>
        <input type="hidden" id="sol-tipo" value="interno">

        <!-- Campos INTERNO -->
        <div id="sol-campos-interno">
            <div class="input-group">
                <label>Nombre</label>
                <input type="text" id="req-nombre" placeholder="Ej: Juan">
            </div>
            <div class="input-group">
                <label>Apellido</label>
                <input type="text" id="req-apellido" placeholder="Ej: Pérez">
            </div>
            <div class="input-group">
                <label>Correo @tecnoimagen.com.ar</label>
                <input type="email" id="req-email" placeholder="usuario@tecnoimagen.com.ar">
            </div>
            <div class="input-group">
                <label>Motivo del acceso</label>
                <textarea id="req-motivo" rows="3" placeholder="Describa brevemente su función..."></textarea>
            </div>
        </div>

        <!-- Campos CLIENTE -->
        <div id="sol-campos-cliente" style="display:none">
            <div class="input-group">
                <label>Nombre / referencia</label>
                <input type="text" id="req-cliente-nombre" placeholder="Ej: Resp. de Sistemas">
            </div>
            <div class="input-group">
                <label>Correo (no @tecnoimagen.com.ar)</label>
                <input type="email" id="req-cliente-email" placeholder="sistemas@hospital.org.ar">
            </div>
            <div class="input-group">
                <label>Hospital(es) a los que necesita acceso</label>
                <div id="sol-hosp-list" style="border:1px solid var(--border);border-radius:var(--radius);max-height:180px;overflow-y:auto;background:var(--surface2)">
                    <div style="padding:14px;color:var(--muted);font-size:.85em;text-align:center">Cargando hospitales...</div>
                </div>
            </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="btn-login" onclick="cerrarModalSolicitud()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);flex:1;">Cancelar</button>
            <button class="btn-login" id="btn-enviar-sol" onclick="enviarSolicitud()" style="flex:1.5;">Enviar Solicitud</button>
        </div>
    </div>
</div>

<script>
    // --- FUNCIONES DE LOGIN ---
    async function validarAcceso() {
        const identificador = document.getElementById('identificador').value.trim();
        const password = document.getElementById('password').value;
        if (!identificador || !password) return;

        const btn = document.getElementById('btn-ingresar');
        btn.disabled = true;
        btn.innerText = "Ingresando...";

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: identificador, password })
            });
            const data = await response.json();
            if (data.success) {
                sessionStorage.setItem('tecnomonitor_token', data.token);
                sessionStorage.setItem('tecnomonitor_user', JSON.stringify(data.user));

                if (data.user.role === 'Cliente') {
                    window.location.href = '/monitor';   // rebota internamente a /cliente
                } else {
                    abrirModalVersion();   // 👈 pregunta solo a roles internos
                }
            } else {
                mostrarError(data.message || "Credenciales incorrectas");
                btn.disabled = false;
                btn.innerText = "Ingresar";
            }
        } catch (e) {
            mostrarError("Error de conexión");
            btn.disabled = false;
            btn.innerText = "Ingresar";
        }
    }

    function abrirModalVersion() {
        document.getElementById('modal-version').style.display = 'flex';
    }

    function irAVersionClasica() {
        window.location.href = '/monitor';
    }

    function irAVersionBeta() {
        window.location.href = '/beta';
    }

    function mostrarError(texto) {
        const msg = document.getElementById('error-msg');
        msg.innerText = "⚠️ " + texto;
        msg.style.display = 'block';
    }

    function checkEnter(e) { if (e.key === "Enter") validarAcceso(); }

    sessionStorage.removeItem('tecnomonitor_user');

    // --- SOLICITUD DE ACCESO (interno / cliente) ---
    var solHospitalesCache = [];
    var solHospitalesSeleccionados = [];

    function cambiarTipoSolicitud(tipo) {
        document.getElementById('sol-tipo').value = tipo;
        var btnI = document.getElementById('btn-sol-interno');
        var btnC = document.getElementById('btn-sol-cliente');
        var campI = document.getElementById('sol-campos-interno');
        var campC = document.getElementById('sol-campos-cliente');

        if (tipo === 'interno') {
            btnI.style.background = 'var(--green-dim)'; btnI.style.color = 'var(--green)';
            btnC.style.background = 'var(--surface2)'; btnC.style.color = 'var(--muted)';
            campI.style.display = ''; campC.style.display = 'none';
        } else {
            btnC.style.background = 'var(--green-dim)'; btnC.style.color = 'var(--green)';
            btnI.style.background = 'var(--surface2)'; btnI.style.color = 'var(--muted)';
            campC.style.display = ''; campI.style.display = 'none';
            if (!solHospitalesCache.length) cargarHospitalesSolicitud();
        }
    }

    function cargarHospitalesSolicitud() {
        fetch('/api/hospitales-publico')
            .then(function(r){ return r.json(); })
            .then(function(data){
                solHospitalesCache = data;
                var cont = document.getElementById('sol-hosp-list');
                if (!data.length) { cont.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:.85em;text-align:center">No hay hospitales disponibles</div>'; return; }
                cont.innerHTML = data.map(function(h){
                    return '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:.9em">'
                        + '<input type="checkbox" value="' + h.hospital_id + '" onchange="toggleHospSolicitud(this)" style="width:16px;height:16px;accent-color:var(--green);cursor:pointer">'
                        + '<span>' + h.nombre + ' <span style="color:var(--muted);font-family:monospace;font-size:.85em">(' + h.hospital_id + ')</span></span>'
                        + '</label>';
                }).join('');
            })
            .catch(function(){
                document.getElementById('sol-hosp-list').innerHTML = '<div style="padding:14px;color:var(--red);font-size:.85em;text-align:center">Error al cargar hospitales</div>';
            });
    }

    function toggleHospSolicitud(chk) {
        var id = chk.value;
        if (chk.checked) {
            if (solHospitalesSeleccionados.indexOf(id) < 0) solHospitalesSeleccionados.push(id);
        } else {
            solHospitalesSeleccionados = solHospitalesSeleccionados.filter(function(h){ return h !== id; });
        }
    }

    function abrirModalSolicitud() {
        document.getElementById('modal-solicitud').style.display = 'flex';
        cambiarTipoSolicitud('interno');
    }

    function cerrarModalSolicitud() {
        document.getElementById('modal-solicitud').style.display = 'none';
    }

    async function enviarSolicitud() {
        var tipo = document.getElementById('sol-tipo').value;
        var btn = document.getElementById('btn-enviar-sol');
        var payload = { tipo: tipo };

        if (tipo === 'interno') {
            var email = document.getElementById('req-email').value.toLowerCase().trim();
            if (!email.endsWith("@tecnoimagen.com.ar")) {
                alert("⚠️ Por seguridad, solo puedes solicitar acceso interno con tu mail de @tecnoimagen.com.ar");
                return;
            }
            payload.email = email;
            payload.nombre = document.getElementById('req-nombre').value.trim();
            payload.apellido = document.getElementById('req-apellido').value.trim();
            payload.motivo = document.getElementById('req-motivo').value.trim();
            if (!payload.nombre || !payload.apellido || !payload.motivo) {
                alert("Por favor, completa todos los campos.");
                return;
            }
        } else {
            var emailC = document.getElementById('req-cliente-email').value.toLowerCase().trim();
            if (emailC.endsWith("@tecnoimagen.com.ar")) {
                alert("⚠️ Usá un correo externo para solicitudes de cliente.");
                return;
            }
            payload.email = emailC;
            payload.nombre = document.getElementById('req-cliente-nombre').value.trim();
            payload.full_name_cliente = payload.nombre;
            payload.hospital_ids = solHospitalesSeleccionados;
            if (!payload.nombre || !emailC) {
                alert("Completá el nombre/referencia y el correo.");
                return;
            }
            if (!payload.hospital_ids.length) {
                alert("Seleccioná al menos un hospital.");
                return;
            }
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            const response = await fetch('/api/access-requests', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("✅ Solicitud enviada. Un administrador la revisará pronto.");
                cerrarModalSolicitud();
                solHospitalesSeleccionados = [];
            } else {
                const error = await response.json();
                alert("❌ Error: " + (error.detail || "No se pudo enviar la solicitud"));
            }
        } catch (e) {
            alert("❌ Error de red.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Enviar Solicitud";
        }
    }

    // Cerrar modal al hacer click afuera
    document.getElementById('modal-solicitud').addEventListener('click', function(e){
        if (e.target === this) cerrarModalSolicitud();
    });
    document.getElementById('modal-version').addEventListener('click', function(e){
        if (e.target === this) irAVersionClasica();  // si cierra sin elegir, va a la clásica por defecto
    });
</script>
</body>
</html>
