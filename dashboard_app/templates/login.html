<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - TecnoMonitor</title>
    
    <link rel="stylesheet" href="/static/style.css">

    <style>
        :root {
            --primary: #3498db;
            --dark: #2c3e50;
            --danger: #e74c3c;
            --radius: 8px;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            margin: 20px;
        }

        .logo-container {
            margin-bottom: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(52, 152, 219, 0.1);
            padding: 15px;
            border-radius: 50%;
        }

        h1 {
            color: var(--dark);
            font-size: 1.5rem;
            margin: 0 0 5px 0;
            font-weight: 700;
        }

        p.subtitle {
            color: #7f8c8d;
            margin: 0 0 30px 0;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e4e8;
            border-radius: var(--radius);
            font-size: 1rem;
            box-sizing: border-box; /* Crucial para que no se desborde */
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-login:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        #error-msg {
            background: #fdeded;
            color: var(--danger);
            padding: 10px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            margin-top: 20px;
            display: none;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
                <path d="M10 9l2 2 4-4"></path> </svg>
        </div>

        <h1>TecnoMonitor</h1>
        <p class="subtitle">Acceso a Infraestructura</p>

        <div class="input-group">
            <label for="access-code">Código de Acceso</label>
            <input type="password" id="access-code" placeholder="••••••••" onkeyup="checkEnter(event)" autofocus>
        </div>

        <button class="btn-login" onclick="validarAcceso()">Ingresar</button>

        <div id="error-msg">
            ⚠️ Código de acceso incorrecto
        </div>
    </div>

    <script>
        async function validarAcceso() {
            const codigo = document.getElementById('access-code').value;
            const btn = document.querySelector('.btn-login');
            const errorMsg = document.getElementById('error-msg');

            if (!codigo) return;

            // Estado de carga
            btn.disabled = true;
            btn.innerText = "Verificando...";
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ code: codigo })
                });
                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('tecnomonitor_auth', 'true');
                    window.location.href = '/monitor';
                } else {
                    mostrarError("Código incorrecto, intente nuevamente.");
                }
            } catch (e) {
                console.error(e);
                mostrarError("Error de conexión con el servidor.");
            }
        }

        function mostrarError(texto) {
            const errorMsg = document.getElementById('error-msg');
            const btn = document.querySelector('.btn-login');
            
            errorMsg.innerText = texto;
            errorMsg.style.display = 'block';
            
            // Resetear botón
            btn.disabled = false;
            btn.innerText = "Ingresar";
            
            // Animación de sacudida (Shake) para feedback visual
            const card = document.querySelector('.login-card');
            card.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-10px)' },
                { transform: 'translateX(10px)' },
                { transform: 'translateX(0)' }
            ], { duration: 300 });
        }

        function checkEnter(e) {
            if (e.key === "Enter") validarAcceso();
        }

        // Limpiar sesión al cargar
        sessionStorage.removeItem('tecnomonitor_auth');
    </script>

</body>
</html>
